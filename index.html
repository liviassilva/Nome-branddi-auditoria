<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branddi · Auditoria</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231abcac'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --brand:#1abcac;--brand-light:#e6f9f7;--brand-dark:#0d9e90;
  --surface:#fff;--surface2:#f7fafa;--surface3:#eef4f4;
  --text:#1a2332;--text2:#4a5568;--text3:#8492a6;
  --border:#e2e8f0;--border2:#cbd5e0;
  --radius:8px;--green:#38a169;--red:#e53e3e;--amber:#d69e2e;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'Cascadia Code','Fira Code','Courier New',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 25px rgba(0,0,0,.12),0 4px 6px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:var(--font);color:var(--text);background:var(--surface2);min-height:100vh}

/* TOP BAR */
#topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:50px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
  flex-wrap:nowrap;overflow-x:auto;
}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;white-space:nowrap;flex-shrink:0}
.topbar-logo svg{width:26px;height:26px;flex-shrink:0}
.brand-sep{color:var(--brand)}
.topbar-badge{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:var(--brand-light);color:var(--brand-dark);
  font-weight:600;white-space:nowrap;flex-shrink:0
}
.topbar-sync{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.topbar-spacer{flex:1;min-width:8px}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:6px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);font-size:11px;font-family:var(--font);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0
}
.btn:hover{background:var(--surface3)}
.btn:active{transform:scale(.97)}
.btn-brand{background:var(--brand);color:#fff;border-color:var(--brand-dark)}
.btn-brand:hover{background:var(--brand-dark)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-danger{background:#fff5f5;color:var(--red);border-color:#feb2b2}
.btn-danger:hover{background:#fed7d7}

/* BANNERS */
#sync-banner{
  display:none;align-items:center;gap:10px;
  padding:7px 14px;background:var(--brand-light);
  border-bottom:1px solid var(--brand);
  font-size:12px;color:var(--brand-dark);
}
#sync-banner.active{display:flex}
.spinner{
  width:13px;height:13px;border:2px solid var(--brand);
  border-top-color:transparent;border-radius:50%;
  animation:spin .6s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MASS BAR */
#mass-bar{
  display:none;align-items:center;gap:8px;
  padding:7px 14px;background:#276749;color:#fff;
  border-bottom:2px solid #1c4f36;font-size:12px;
}
#mass-bar.active{display:flex}
#mass-bar select{
  padding:4px 8px;border-radius:5px;
  border:1px solid rgba(255,255,255,.4);
  background:#fff;color:var(--text);font-size:11px;
}
#mass-bar .btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.35);color:#fff}
#mass-bar .btn:hover{background:rgba(255,255,255,.25)}

/* SECTION TABS */
#section-tabs{
  display:flex;
  padding:0 14px;background:var(--surface);
  border-bottom:2px solid var(--border);
}
.section-tab{
  padding:10px 16px;cursor:pointer;font-size:13px;
  color:var(--text2);border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;white-space:nowrap
}
.section-tab:hover{color:var(--brand)}
.section-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}

/* SECTION CONTENT */
.section-content{display:none;padding:14px}
.section-content.active{display:block}

/* CARTEIRA TABS */
.carteira-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.carteira-tab{
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s;white-space:nowrap
}
.carteira-tab:hover{border-color:var(--brand);color:var(--brand)}
.carteira-tab.active{background:var(--brand);color:#fff;border-color:var(--brand-dark)}

/* TYPE FILTER */
.type-filter{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.type-filter-label{font-size:11px;color:var(--text3)}
.type-btn{
  padding:3px 11px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s
}
.type-btn.active{background:var(--brand-light);color:var(--brand-dark);border-color:var(--brand)}
.type-btn:hover{border-color:var(--brand)}

/* SECTION META */
.section-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px;color:var(--text2)}
.count-badge{background:var(--surface3);border:1px solid var(--border);padding:2px 8px;border-radius:12px;font-size:11px}
.count-badge.pending{background:#fffbeb;border-color:#f6e05e;color:#744210}
.count-badge.done{background:#f0fff4;border-color:#9ae6b4;color:#276749}

/* TABLE */
.table-wrapper{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden
}
.table-scroll{overflow-x:auto;max-height:calc(100vh - 255px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  position:sticky;top:0;background:var(--surface3);
  border-bottom:2px solid var(--border2);
  padding:7px 9px;text-align:left;white-space:nowrap;
  font-weight:600;color:var(--text2);z-index:10;user-select:none
}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{color:var(--brand);background:var(--brand-light)}
thead th.sort-asc .si,thead th.sort-desc .si{color:var(--brand)}
.si{margin-left:3px;opacity:.5;font-size:10px}
thead th.sort-asc .si,thead th.sort-desc .si{opacity:1}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody tr.row-done{background:#f0fff4}
tbody tr.row-done:hover{background:#e6ffed}
tbody td{padding:6px 9px;vertical-align:top}

/* CHECKBOX */
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--brand)}

/* CARD LINK */
.card-link{color:var(--text);text-decoration:none;font-weight:500}
.card-link:hover{color:var(--brand);text-decoration:underline}
.late-tag{display:inline-block;color:var(--red);font-size:10px;margin-top:2px}

/* INLINE CONTROLS */
select.ctrl-sel,textarea.ctrl-ta{
  border:1px solid var(--border);border-radius:4px;
  padding:4px 6px;font-size:11px;font-family:var(--font);
  background:var(--surface);color:var(--text);
  transition:border-color .15s;width:100%
}
select.ctrl-sel:focus,textarea.ctrl-ta:focus{
  outline:none;border-color:var(--brand);
  box-shadow:0 0 0 2px rgba(26,188,172,.15)
}
select.ctrl-sel{min-width:80px}
textarea.ctrl-ta{resize:none;overflow:hidden;min-height:30px;line-height:1.4}
select.fin-sim{background:#f0fff4;border-color:var(--green);color:#276749}
select.fin-nao{background:#fff5f5;border-color:#feb2b2;color:#9b2335}

/* ACTION COL STICKY */
td.col-act{
  position:sticky;right:0;background:var(--surface);
  border-left:1px solid var(--border2);z-index:5;padding:5px 8px
}
tr:hover td.col-act{background:var(--surface2)}
tr.row-done td.col-act{background:#f0fff4}
tr.row-done:hover td.col-act{background:#e6ffed}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:600}
.badge-tipo{background:var(--brand-light);color:var(--brand-dark)}
.badge-fase{background:var(--surface3);color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-next{background:#fffbeb;color:var(--amber);border:1px solid #f6e05e}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:1000;
  align-items:center;justify-content:center;padding:16px
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border-radius:12px;
  box-shadow:var(--shadow-lg);width:100%;max-width:540px;
  max-height:90vh;overflow-y:auto;display:flex;flex-direction:column
}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0
}
.modal-title{font-size:14px;font-weight:700}
.modal-close{
  background:none;border:none;cursor:pointer;
  color:var(--text3);font-size:20px;line-height:1;
  padding:3px 6px;border-radius:4px
}
.modal-close:hover{color:var(--text);background:var(--surface3)}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}
.modal-ft{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;flex-shrink:0
}
.form-grp{display:flex;flex-direction:column;gap:4px}
.form-lbl{font-size:11px;font-weight:600;color:var(--text2)}
.form-lbl .req{color:var(--red)}
.form-inp,.form-sel,.form-ta{
  border:1px solid var(--border2);border-radius:6px;
  padding:7px 10px;font-size:12px;font-family:var(--font);
  background:var(--surface);color:var(--text);width:100%
}
.form-inp:focus,.form-sel:focus,.form-ta:focus{
  outline:none;border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(26,188,172,.15)
}
.form-ta{resize:vertical;min-height:90px}
.form-hint{font-size:10px;color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TEMPLATE CHIPS */
.tpl-chips{display:flex;gap:5px;flex-wrap:wrap}
.tpl-chip{
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);cursor:pointer;
  font-size:11px;color:var(--text2);transition:all .15s;background:var(--surface)
}
.tpl-chip.active{background:var(--brand);color:#fff;border-color:var(--brand-dark)}

/* GCHAT CHIPS */
.gchat-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.gchat-chip{
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);cursor:pointer;
  font-size:11px;color:var(--text2);transition:all .15s
}
.gchat-chip.active{background:var(--brand);color:#fff;border-color:var(--brand-dark)}

/* ANALYTICS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)
}
.kpi-val{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.kpi-card.c-brand .kpi-val{color:var(--brand)}
.kpi-card.c-green .kpi-val{color:var(--green)}
.kpi-card.c-red .kpi-val{color:var(--red)}
.kpi-card.c-amber .kpi-val{color:var(--amber)}

.analytics-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.a-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.a-card-title{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--text)}
.a-sub{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.meta-row{margin-bottom:10px}
.meta-row-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;gap:8px}
.meta-row-top .mr-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meta-row-top .mr-num{font-family:var(--mono);color:var(--text3);flex-shrink:0}

.prog-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.prog-lbl{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-track{flex:1;height:9px;background:var(--surface3);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand-dark));border-radius:5px;transition:width .4s}
.prog-count{font-size:10px;color:var(--text3);width:50px;text-align:right;font-family:var(--mono)}

.rank-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.rank-name{font-size:11px;color:var(--text);width:100px;flex-shrink:0}
.rank-n{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--brand);width:25px;text-align:right}
.rank-bar{flex:1;height:7px;background:var(--surface3);border-radius:4px;overflow:hidden}
.rank-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .4s}

/* CONFIG */
.cfg-field{margin-bottom:10px}
.cfg-field label{display:block;font-size:11px;font-weight:600;margin-bottom:3px;color:var(--text2)}
.cfg-field input{
  width:100%;padding:6px 9px;border:1px solid var(--border2);
  border-radius:6px;font-size:11px;font-family:var(--mono)
}

/* PHASE LIST */
.fase-list{list-style:none}
.fase-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px}
.fase-item:last-child{border-bottom:none}
.fase-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0}
.fase-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text3)}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:12px}
.empty svg{width:40px;height:40px;opacity:.25;display:block;margin:0 auto 10px}

/* TOAST */
#toast-ct{position:fixed;bottom:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  padding:9px 14px;border-radius:7px;font-size:12px;
  box-shadow:var(--shadow-md);min-width:200px;pointer-events:all;
  animation:tst-in .2s ease
}
@keyframes tst-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}
.toast-info{background:var(--brand);color:#fff}

/* ONBOARDING INFO BOX */
.info-box{background:var(--brand-light);border:1px solid var(--brand);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--brand-dark)}

/* AGENTE NE */
.btn-ne{background:#eef2ff;color:#4f46e5;border-color:#c7d2fe}
.btn-ne:hover{background:#e0e7ff}
.ne-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:34px 16px;color:var(--text2);font-size:12px;text-align:center;line-height:1.5}
.ne-loading .spinner{width:24px;height:24px;border-width:3px}
.ne-sec{margin-bottom:15px}
.ne-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:6px}
.ne-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ne-fase-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--brand-light);color:var(--brand-dark);font-weight:600;font-size:12px}
.ne-inpi-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface3);color:var(--text2);font-size:11px;font-weight:600}
.ne-block{background:#fff5f5;color:#9b2335;border:1px solid #feb2b2;border-radius:8px;padding:12px 14px;font-size:12px;font-weight:600;line-height:1.5}
.ne-block.ok{background:#f0fff4;color:#276749;border-color:#9ae6b4}
table.ne-score{width:100%;border-collapse:collapse;font-size:12px}
table.ne-score td{padding:5px 8px;border-bottom:1px solid var(--border)}
table.ne-score td:last-child{text-align:right;font-family:var(--mono);font-weight:600;white-space:nowrap}
table.ne-score tr.tot td{border-top:2px solid var(--border2);border-bottom:none;font-weight:700;padding-top:8px;font-size:13px}
table.ne-score tr.tot td:last-child{color:var(--brand);font-size:15px}
.ne-chip{display:inline-block;background:#fffbeb;color:#744210;border:1px solid #f6e05e;border-radius:12px;padding:3px 9px;font-size:11px;margin:0 4px 5px 0}
.ne-chip.miss{background:#fff5f5;color:#9b2335;border-color:#feb2b2}
.ne-decisao{background:var(--surface3);border-left:3px solid var(--brand);padding:10px 12px;font-size:12px;border-radius:0 6px 6px 0;line-height:1.55}
.ne-email{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px}
.ne-email-subj{font-weight:700;font-size:12px;margin-bottom:7px;color:var(--text)}
.ne-email-body{font-size:12px;white-space:pre-wrap;line-height:1.55;max-height:300px;overflow:auto;color:var(--text)}
.ne-apx{font-size:10px;color:var(--text3);margin-top:6px}

@media(max-width:768px){
  .analytics-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header id="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="26" height="26" rx="5" fill="#1abcac"/>
      <text x="13" y="18" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">B</text>
    </svg>
    <span>Branddi<span class="brand-sep"> · </span>Auditoria</span>
  </div>
  <span class="topbar-badge" id="badge-status">● Conectando…</span>
  <span class="topbar-sync" id="lbl-sync">Último sync: —</span>
  <div class="topbar-spacer"></div>
  <button class="btn btn-brand" onclick="syncPipefy()">↻ Sincronizar</button>
  <button class="btn" onclick="clearCache()">🗑 Cache</button>
  <button class="btn" onclick="abrirFases()">🏷 Fases</button>
  <button class="btn" onclick="abrirConfig()">⚙ Config</button>
  <button class="btn" onclick="enviarResumo()">📨 Resumo</button>
  <button class="btn" onclick="exportar()">⬇ Exportar</button>
  <button class="btn btn-ne" onclick="demoNE()">🤖 Exemplo NE</button>
  <button class="btn" onclick="loadCardsSupabase()">🗄 Cards (Supabase)</button>
</header>

<!-- SYNC BANNER -->
<div id="sync-banner">
  <div class="spinner"></div>
  <span id="sync-txt">Sincronizando…</span>
</div>

<!-- MASS BAR -->
<div id="mass-bar">
  <span id="mass-ct">0 selecionados</span>
  <select id="mass-anal" style="color:var(--text)">
    <option value="">Definir Analista…</option>
  </select>
  <button class="btn" onclick="massApply('analista')">Aplicar Analista</button>
  <button class="btn" onclick="massApply('sim')">✓ Marcar Sim</button>
  <button class="btn" onclick="massApply('nao')">✗ Marcar Não</button>
  <button class="btn" style="margin-left:auto" onclick="limparSel()">✕ Cancelar</button>
</div>

<!-- SECTION TABS -->
<nav id="section-tabs">
  <div class="section-tab active" data-s="atrasos" onclick="setSecao('atrasos')">Tarefas em Atraso</div>
  <div class="section-tab" data-s="negacoes" onclick="setSecao('negacoes')">CS - Negativações</div>
  <div class="section-tab" data-s="outros" onclick="setSecao('outros')">Atrasos - CS Front</div>
  <div class="section-tab" data-s="analitico" onclick="setSecao('analitico')">Painel Analítico</div>
</nav>

<!-- ATRASOS -->
<div id="sec-atrasos" class="section-content active">
  <div class="carteira-tabs" id="ct-atrasos"></div>
  <div class="section-meta" id="meta-atrasos"></div>
  <div class="table-wrapper"><div class="table-scroll">
    <table id="tbl-atrasos"><thead></thead><tbody></tbody></table>
  </div></div>

function excelToDate(serial) {
  if (!serial) return null;
  const n = parseFloat(serial);
  if (isNaN(n)) return null;
  return new Date((n - 25569) * 86400000);
}

function parseData(s) {
  if (!s) return null;
  if (typeof s === 'number') return excelToDate(s);
  s = String(s).trim();
  if (/^\d{5}$/.test(s)) return excelToDate(parseFloat(s));
  if (s.includes('T')) return new Date(s);
  if (/\d{2}\/\d{2}\/\d{4}/.test(s)) {
    const [d,m,y] = s.split('/');
    return new Date(+y, +m-1, +d);
  }
  if (/\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  return null;
}

function fmtData(v) {
  const d = parseData(v);
  if (!d || isNaN(d)) return '—';
  return d.toLocaleDateString('pt-BR');
}

function hojeBrasilia() {
  const now = new Date();
  const brt = new Date(now.toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
  brt.setHours(0,0,0,0);
  return brt;
}

function diasAtraso(venc) {
  const d = parseData(venc);
  if (!d) return null;
  const hoje = hojeBrasilia();
  d.setHours(0,0,0,0);
  return Math.floor((hoje - d) / 86400000);
}

function isFinalizadoHoje(ctrl) {
  if (!ctrl || ctrl.finalizado !== 'Sim' || !ctrl.updated_at) return false;
  const upd = new Date(ctrl.updated_at);
  const updBRT = new Date(upd.toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
  updBRT.setHours(0,0,0,0);
  return updBRT.getTime() === hojeBrasilia().getTime();
}

function getCfg() {
  try { return {...DEFAULT_CFG, ...JSON.parse(localStorage.getItem('brd_cfg')||'{}')}; }
  catch { return {...DEFAULT_CFG}; }
}

function carteiraPorTitulo(titulo) {
  if (!titulo) return 'Sem Carteira';
  const t = titulo.toLowerCase().trim();
  for (const [k,v] of Object.entries(MAPA_CARTEIRAS)) {
    if (k.toLowerCase().trim() === t) return v;
  }
  for (const [k,v] of Object.entries(MAPA_CARTEIRAS)) {
    if (t.startsWith(k.toLowerCase().trim())) return v;
  }
  return 'Sem Carteira';
}

function proximaFase(atual) {
  const i = FASES_PROG.indexOf(atual);
  if (i < 0 || i >= FASES_PROG.length-1) return null;
  return FASES_PROG[i+1];
}

function toast(msg, tipo='info', dur=3200) {
  const el = document.createElement('div');
  el.className = `toast toast-${tipo==='success'?'ok':tipo}`;
  el.textContent = msg;
  document.getElementById('toast-ct').appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

function banner(msg) {
  document.getElementById('sync-txt').textContent = msg;
  document.getElementById('sync-banner').classList.add('active');
}
function hideBanner() { document.getElementById('sync-banner').classList.remove('active'); }

function abrirMdl(id) { document.getElementById(id).classList.add('active'); }
function fecharMdl(id) { document.getElementById(id).classList.remove('active'); }

function getField(card, keys) {
  if (!card.fields) return '';
  const kl = Array.isArray(keys) ? keys : [keys];
  for (const k of kl) {
    const f = card.fields.find(f => f.field?.label?.toLowerCase().includes(k.toLowerCase()));
    if (f?.value) return f.value;
  }
  return '';
}

function extrairIdDaURL(url) {
  if (!url) return null;
  const m = url.match(/cards\/(\d+)/);
  return m ? m[1] : null;
}

function initSupabase() {
  const {supabaseUrl, supabaseKey} = S.cfg;
  if (!supabaseUrl || supabaseUrl.includes('SUA_')) {
    document.getElementById('badge-status').textContent = '⚠ Configure Supabase';
    return;
  }
  try {
    S.sb = window.supabase.createClient(supabaseUrl, supabaseKey);
    document.getElementById('badge-status').textContent = '● Supabase + Pipefy';
  } catch(e) {
    console.error('Supabase init:', e);
    document.getElementById('badge-status').textContent = '✗ Erro Supabase';
  }
}

async function carregarControles() {
  if (!S.sb) return;
  const {data, error} = await S.sb.from('auditoria_controles').select('*');
  if (error) { console.error('carregarControles:', error); return; }
  S.ctrl = {};
  (data||[]).forEach(r => { S.ctrl[r.card_id] = r; });
}

async function persistCtrl(cardId, campo, valor) {
  if (!S.ctrl[cardId]) S.ctrl[cardId] = {card_id: cardId};
  S.ctrl[cardId][campo] = valor;
  S.ctrl[cardId].updated_at = new Date().toISOString();

  // Garantir carteira preenchida
  const card = S.cards.find(c => c.id === cardId);
  if (card) S.ctrl[cardId].carteira = card.carteira || '';

  if (!S.sb) return;
  const r = S.ctrl[cardId];
  const payload = {
    card_id:   cardId,
    carteira:  r.carteira  || '',
    finalizado:r.finalizado|| 'Não',
    analista:  r.analista  || '',
    obs:       r.obs       || '',
    validacao: r.validacao || '',
    updated_at:r.updated_at,
  };
  const {error} = await S.sb.from('auditoria_controles').upsert(payload, {onConflict:'card_id'});
  if (error) console.error('persistCtrl:', error);
}

function dbPersist(cardId, campo, valor) {
  const k = cardId+'-'+campo;
  clearTimeout(S.timers[k]);
  S.timers[k] = setTimeout(()=>persistCtrl(cardId, campo, valor), 800);
}

// ─────────────────────────────────────────────
// PIPEFY API
// ─────────────────────────────────────────────
async function gql(query, vars={}) {
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 12000); // não trava pra sempre
  let resp;
  try {
    resp = await fetch('https://api.pipefy.com/graphql', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${S.cfg.pipefyToken}`,
      },
      body: JSON.stringify({query, variables: vars}),
      signal: ctrl.signal,
    });
  } catch(e) {
    throw new Error(ctrl.signal.aborted
      ? 'Tempo esgotado ao falar com o Pipefy (conexão bloqueada? use o site publicado).'
      : (e.message || 'Falha de rede com o Pipefy.'));
  } finally {
    clearTimeout(tid);
  }
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.errors) throw new Error(json.errors.map(e=>e.message).join('; '));
  return json.data;
}

const CARD_FIELDS = `id title url due_date updated_at
  current_phase{id name}
  assignees{name}
  fields{field{label} value}`;

// Uma página (até 100) de cards de UMA fase
async function fetchPhaseCards(phaseId, after=null) {
  const q = `query($p:ID!,$a:String){phase(id:$p){cards(first:100,after:$a){
    edges{node{${CARD_FIELDS}}}
    pageInfo{hasNextPage endCursor}
  }}}`;
  const d = await gql(q, {p:phaseId, a:after});
  return d.phase?.cards || {edges:[], pageInfo:{hasNextPage:false}};
}

// Todos os cards de um pipe, paralelizando por fase:
// 1ª página de TODAS as fases em paralelo; depois pagina só as fases que têm mais cards (lotes de 100).
async function fetchTodosCards(pipeId, onProgress=null) {
  let phases = S.phases[pipeId];
  if (!phases?.length) { phases = await fetchFases(pipeId); S.phases[pipeId] = phases; }

  const acc = [];
  const restantes = [];

  // 1ª página de todas as fases — em paralelo
  const primeiras = await Promise.allSettled(phases.map(ph => fetchPhaseCards(ph.id)));
  primeiras.forEach((r,i) => {
    if (r.status !== 'fulfilled') { console.warn('fase', phases[i]?.name, r.reason); return; }
    acc.push(...r.value.edges.map(e=>e.node));
    if (r.value.pageInfo?.hasNextPage)
      restantes.push({id:phases[i].id, after:r.value.pageInfo.endCursor});
  });
  if (onProgress) onProgress(acc.length);

  // Pagina em paralelo só as fases que ainda têm cards
  await Promise.allSettled(restantes.map(async m => {
    let after = m.after, has = true;
    while (has) {
      const c = await fetchPhaseCards(m.id, after);
      acc.push(...c.edges.map(e=>e.node));
      has = !!c.pageInfo?.hasNextPage;
      after = c.pageInfo?.endCursor;
      if (onProgress) onProgress(acc.length);
    }
  }));

  return acc;
}

async function fetchFases(pipeId) {
  const q = `query($p:ID!){pipe(id:$p){phases{id name cards_count}}}`;
  try {
    const d = await gql(q,{p:pipeId});
    return d.pipe.phases||[];
  } catch(e) { console.error('fetchFases:', e); return []; }
}

async function fetchCardDetalhe(cardId) {
  const q = `query($id:ID!){card(id:$id){fields{field{label} value}}}`;
  const d = await gql(q,{id:cardId});
  return d.card;
}

async function postarComentario(cardId, texto) {
  const q = `mutation($cid:ID!,$t:String!){createComment(input:{card_id:$cid,text:$t}){comment{id}}}`;
  return gql(q,{cid:cardId, t:texto});
}

async function moverFase(cardId, faseId) {
  const q = `mutation($c:ID!,$f:ID!){moveCardToPhase(input:{card_id:$c,destination_phase_id:$f}){card{id}}}`;
  return gql(q,{c:cardId, f:faseId});
}

async function atualizarVencimento(cardId, dataISO) {
  const q = `mutation($id:ID!,$d:DateTime){updateCard(input:{id:$id,due_date:$d}){card{id due_date}}}`;
  return gql(q,{id:cardId, d:dataISO});
}

// ─────────────────────────────────────────────
// MAPEAMENTO DE CARDS PIPEFY → MODELO LOCAL
// ─────────────────────────────────────────────
function detectarTipo(raw) {
  const fase = (raw.current_phase?.name||'').toLowerCase();
  for (const k of FASE_NEGACAO_KEYS)  if (fase.includes(k)) return 'negacoes';
  for (const k of FASE_MKTPLACE_KEYS) if (fase.includes(k)) return 'marketplace';
  return 'atrasos';
}

function mapCard(raw, tipo) {
  const cartFld = getField(raw,['carteira','wallet','categoria']);
  const carteira = cartFld || carteiraPorTitulo(raw.title);
  const venc = raw.due_date;
  const dias = diasAtraso(venc);
  return {
    id:             raw.id,
    titulo:         raw.title||'',
    tipo,
    carteira,
    responsavel:    raw.assignees?.[0]?.name||'',
    fase:           raw.current_phase?.name||'',
    phase_id:       raw.current_phase?.id||'',
    data_vencimento:venc,
    dias_atraso:    dias,
    solicitacao:    getField(raw,['solicitação','solicitacao','request']),
    concorrente:    getField(raw,['concorrente','competitor']),
    link_pipefy:    raw.url||'',
    link_externo:   getField(raw,['link do card no pipefy','link do card','opec','link opec']),
    data_onboarding:getField(raw,['onboarding']),
    pipe_id:        tipo==='vencidos'||tipo==='desatualizados' ? PIPE_FLUXO : PIPE_ATIV,
    _upd:           raw.updated_at,
  };
}

function isDesatualizado(raw) {
  if (!raw.updated_at) return false;
  const upd = new Date(raw.updated_at);
  return (Date.now()-upd.getTime()) > 30*86400000;
}

// SYNC PIPEFY
// ─────────────────────────────────────────────
// TESTE: carrega cards reais direto do Supabase (não depende do Pipefy / CORS)
// Mapeia o tipo salvo (nome por extenso) para o tipo interno do dashboard.
const TIPO_DB_MAP = {
  'Atrasos':'atrasos', 'CS - Negativações':'negacoes', 'Cadastro de Marketplace':'marketplace',
  'Vencidos na Fase':'vencidos', 'Desatualizados':'desatualizados'
};
async function loadCardsSupabase() {
  if (!S.sb) { toast('Supabase não conectado','err'); return; }
  banner('Carregando cards reais do Supabase…');
  try {
    const { data, error } = await S.sb.from('auditoria_cards').select('*').limit(1000);
    if (error) throw error;
    S.cards = (data||[]).map(r => ({
      id: String(r.id), titulo: (r.titulo||'').trim(),
      tipo: TIPO_DB_MAP[r.tipo] || (r.tipo||'atrasos'),
      carteira: r.carteira || carteiraPorTitulo(r.titulo),
      responsavel: r.responsavel||'', fase: r.fase||'', phase_id:'',
      data_vencimento: r.data_vencimento, dias_atraso: r.dias_atraso,
      solicitacao: r.solicitacao||'', concorrente: (r.concorrente||'').trim(),
      link_pipefy: r.link_pipefy||'', link_externo:'',
      data_onboarding: r.data_onboarding||'', pipe_id: r.pipe_id||PIPE_ATIV
    }));
    S.lastSync = new Date();
    document.getElementById('lbl-sync').textContent = `Cards reais (Supabase): ${S.cards.length}`;
    renderAll();
    toast(`${S.cards.length} cards reais carregados (teste)`, 'success');
  } catch(e) {
    toast('Erro ao carregar do Supabase: '+(e.message||e), 'err', 6000);
  } finally { hideBanner(); }
}

async function syncPipefy() {
  if (S.syncRunning) return;
  const tk = (S.cfg.pipefyToken||'').trim();
  if (!tk || /SEU_|SUA_/i.test(tk)) {
    banner('⚠ Configure o token do Pipefy em ⚙ Config e clique Sincronizar.');
    setTimeout(hideBanner, 7000);
    toast('Token do Pipefy não configurado — abra ⚙ Config','err',7000);
    document.getElementById('lbl-sync').textContent = 'Falta o token do Pipefy (⚙ Config)';
    return;
  }
  S.syncRunning = true;
  banner('Buscando cards do Pipefy…');
  const t0 = Date.now();

  try {
    // Busca os dois pipes em paralelo
    const [rAtiv, rFluxo] = await Promise.allSettled([
      fetchTodosCards(PIPE_ATIV),
      fetchTodosCards(PIPE_FLUXO),
    ]);

    const ativCards  = rAtiv.status==='fulfilled'  ? rAtiv.value  : [];
    const fluxoCards = rFluxo.status==='fulfilled' ? rFluxo.value : [];
    if (rAtiv.status==='rejected')  console.error('Ativ pipe:', rAtiv.reason);
    if (rFluxo.status==='rejected') console.error('Fluxo pipe:', rFluxo.reason);

    banner(`Processando ${ativCards.length + fluxoCards.length} cards…`);

    const hoje = hojeBrasilia();
    const mapped = [];
    const seen   = new Set();

    // Atividades do Cliente
    for (const raw of ativCards) {
      const tipo = detectarTipo(raw);
      // Atrasos: só se vencido
      if (tipo==='atrasos') {
        const d = parseData(raw.due_date);
        if (!d || d > hoje) continue;
      }
      const key = `${raw.id}-${tipo}`;
      if (!seen.has(key)) { seen.add(key); mapped.push(mapCard(raw,tipo)); }
    }

    // Fluxo Clientes
    for (const raw of fluxoCards) {
      const fase = raw.current_phase?.name||'';
      if (FASES_EX.has(fase)) continue;

      const d = parseData(raw.due_date);
      const vencido = !raw.due_date || (d && d <= hoje);

      if (vencido) {
        const key = `${raw.id}-vencidos`;
        if (!seen.has(key)) { seen.add(key); mapped.push(mapCard(raw,'vencidos')); }
      }
      if (isDesatualizado(raw)) {
        const key = `${raw.id}-desatualizados`;
        if (!seen.has(key)) { seen.add(key); mapped.push(mapCard(raw,'desatualizados')); }
      }
    }

    if (mapped.length || !S.cards.length) S.cards = mapped; // não apaga cards já carregados se o sync vier vazio/erro

    // Upsert Supabase em batches
    if (S.sb) {
      banner('Salvando no Supabase…');
      const rows = mapped.map(c => ({
        id:              c.id,
        titulo:          c.titulo,
        tipo:            c.tipo,
        carteira:        c.carteira,
        responsavel:     c.responsavel,
        fase:            c.fase,
        data_vencimento: c.data_vencimento ? fmtData(c.data_vencimento) : null,
        dias_atraso:     c.dias_atraso,
        solicitacao:     c.solicitacao,
        concorrente:     c.concorrente,
        link_pipefy:     c.link_pipefy,
        data_onboarding: c.data_onboarding,
        pipe_id:         c.pipe_id,
        report_id:       c.report_id ?? null,
        synced_at:       new Date().toISOString(),
      }));
      for (let i=0; i<rows.length; i+=50) {
        await S.sb.from('auditoria_cards')
          .upsert(rows.slice(i,i+50), {onConflict:'id', ignoreDuplicates:false});
      }
    }

    S.lastSync = new Date();
    const el = ((Date.now()-t0)/1000).toFixed(1);
    document.getElementById('lbl-sync').textContent =
      `Último sync: ${S.lastSync.toLocaleTimeString('pt-BR')} (${el}s · ${mapped.length} cards)`;

    renderAll();
    toast(`Sync: ${mapped.length} cards em ${el}s`, 'success');
  } catch(e) {
    console.error('syncPipefy:', e);
    toast('Erro no sync: '+e.message, 'err', 6000);
  } finally {
    S.syncRunning = false;
    hideBanner();
  }
}

function clearCache() {
  if (!confirm('Limpar cache local e sincronizar novamente?')) return;
  S.cards = [];
  renderAll();
  syncPipefy();
}

  S.secao = s;
  document.querySelectorAll('.section-tab').forEach(t=>t.classList.toggle('active',t.dataset.s===s));
  document.querySelectorAll('.section-content').forEach(c=>c.classList.toggle('active',c.id===`sec-${s}`));
  if (s==='analitico') renderAnalitico(); else renderSecao(s);
}

function setCarteira(secao, cart) {
  S.carteira[secao] = cart;
  document.querySelectorAll(`#ct-${secao} .carteira-tab`).forEach(t=>t.classList.toggle('active',t.dataset.c===cart));
  renderTabela(secao);
}

function setTipo(t) {
  S.tipoOutros = t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  renderTabela('outros');
}

function renderAll() {
  ['atrasos','negacoes','outros'].forEach(renderSecao);
  if (S.secao==='analitico') renderAnalitico();
}

function renderSecao(s) {
  renderCarteiraTabs(s);
  renderTabela(s);
}

function renderCarteiraTabs(s) {
  document.getElementById(`ct-${s}`).innerHTML = CARTEIRAS.map(c=>
    `<div class="carteira-tab${S.carteira[s]===c?' active':''}" data-c="${c}" onclick="setCarteira('${s}','${c}')">${c}</div>`
  ).join('');
}

const TIPOS_SECAO = {
  atrasos: ['atrasos'],
  negacoes: ['negacoes'],
  outros: ['vencidos','desatualizados','marketplace'],
};

function getCardsVisiveis(s) {
  let cards = S.cards.filter(c=>TIPOS_SECAO[s].includes(c.tipo));
  if (s==='outros' && S.tipoOutros!=='todos')
    cards = cards.filter(c=>c.tipo===S.tipoOutros);
  if (S.carteira[s]!=='Todos')
    cards = cards.filter(c=>c.carteira===S.carteira[s]);
  return cards;
}

function renderTabela(s) {
  const cards = getCardsVisiveis(s);
  const tbl = document.getElementById(`tbl-${s}`);
  const csfront = s==='outros';
  const showConc = !csfront;
  const showObsVal = !csfront;
  const srt = S.sort[s];

  // Cabeçalho
  function th(field, label) {
    const ativo = srt?.field===field;
    const icon  = !ativo ? '⇅' : srt.dir==='asc' ? '↑' : '↓';
    const cls   = ativo ? `sort-${srt.dir}` : '';
    return `<th class="sortable ${cls}" onclick="toggleSort('${s}','${field}')">${label}<span class="si">${icon}</span></th>`;
  }

  tbl.querySelector('thead').innerHTML = `<tr>
    <th style="width:30px"><input type="checkbox" id="chkAll-${s}" onchange="selecionarTodos('${s}',this.checked)"></th>
    ${th('titulo','Título')}
    ${csfront ? '<th>Tipo</th>' : ''}
    ${showConc ? th('concorrente','Concorrente') : ''}
    ${th('solicitacao','Solicitação')}
    ${th('fase','Fase')}
    ${th('data_vencimento','Vencimento')}
    <th>Finalizado</th>
    <th>Analista CS</th>
    ${showObsVal ? '<th style="min-width:140px">Observações</th><th style="min-width:140px">Validação</th>' : ''}
    <th class="col-act" style="width:88px">Ação</th>
  </tr>`;

  // Ordenação
  let sorted = [...cards];
  if (srt) {
    sorted.sort((a,b)=>{
      let va=a[srt.field]??'', vb=b[srt.field]??'';
      if (srt.field==='data_vencimento') {
        va = parseData(va)?.getTime()??0;
        vb = parseData(vb)?.getTime()??0;
      } else {
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
      }
      return va<vb ? (srt.dir==='asc'?-1:1) : va>vb ? (srt.dir==='asc'?1:-1) : 0;
    });
  }

  if (!sorted.length) {
    tbl.querySelector('tbody').innerHTML = `<tr><td colspan="20"><div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
      Nenhum card encontrado
    </div></td></tr>`;
  } else {
    tbl.querySelector('tbody').innerHTML = sorted.map(c=>renderLinha(c,s,csfront,showConc,showObsVal)).join('');
    tbl.querySelectorAll('textarea.ctrl-ta').forEach(autoExpand);
  }

  // Meta
  const total = cards.length;
  const fim   = cards.filter(c=>S.ctrl[c.id]?.finalizado==='Sim').length;
  document.getElementById(`meta-${s}`).innerHTML = `
    <span class="count-badge">${total} card${total!==1?'s':''}</span>
    <span class="count-badge pending">${total-fim} pendente${total-fim!==1?'s':''}</span>
    <span class="count-badge done">${fim} concluído${fim!==1?'s':''}</span>
  `;
}

function renderLinha(card, s, csfront, showConc, showObsVal) {
  const ctrl  = S.ctrl[card.id]||{};
  const fin   = ctrl.finalizado||'Não';
  const done  = fin==='Sim';
  const dias  = card.dias_atraso;
  const late  = (dias!=null&&dias>0) ? `<div class="late-tag">▲ ${dias}d atraso</div>` : '';
  const chk   = S.sel.has(`${card.id}-${card.tipo}`) ? 'checked' : '';

  const optsFin = ['Não','Sim'].map(v=>`<option${fin===v?' selected':''}>${v}</option>`).join('');
  const optsAn  = ['', ...ANALISTAS].map(a=>`<option value="${a}"${ctrl.analista===a?' selected':''}>${a||'— selecionar —'}</option>`).join('');

  const tipoCol = csfront ? `<td><span class="badge badge-tipo">${card.tipo}</span></td>` : '';
  const concCol = showConc ? `<td style="font-size:11px">${card.concorrente||'—'}</td>` : '';
  const obsCol  = showObsVal ? `
    <td><textarea class="ctrl-ta" oninput="autoExpand(this);dbPersist('${card.id}','obs',this.value)">${esc(ctrl.obs||'')}</textarea></td>
    <td><textarea class="ctrl-ta" oninput="autoExpand(this);dbPersist('${card.id}','validacao',this.value)">${esc(ctrl.validacao||'')}</textarea></td>
  ` : '';

  return `<tr data-id="${card.id}" data-tipo="${card.tipo}" class="${done?'row-done':''}">
    <td><input type="checkbox" ${chk} onchange="toggleSel('${card.id}','${card.tipo}',this.checked)"></td>
    <td>
      <a href="${card.link_pipefy||'#'}" target="_blank" class="card-link" title="${esc(card.titulo)}">${esc(card.titulo)||'—'}</a>
      ${late}
    </td>
    ${tipoCol}
    ${concCol}
    <td style="font-size:11px">${esc(card.solicitacao)||'—'}</td>
    <td><span class="badge badge-fase" title="${esc(card.fase)}">${esc(card.fase)||'—'}</span></td>
    <td style="font-family:var(--mono);font-size:11px">${fmtData(card.data_vencimento)}</td>
    <td>
      <select class="ctrl-sel ${done?'fin-sim':'fin-nao'}" onchange="onFinChange('${card.id}','${card.tipo}',this)">
        ${optsFin}
      </select>
    </td>
    <td>
      <select class="ctrl-sel" onchange="dbPersist('${card.id}','analista',this.value)">
        ${optsAn}
      </select>
    </td>
    ${obsCol}
    <td class="col-act">
      <button class="btn btn-sm btn-brand" onclick="abrirComentario('${card.id}','${card.tipo}')">✎ Comentar</button>
    </td>
  </tr>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoExpand(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function onFinChange(cardId, tipo, sel) {
  const v = sel.value;
  sel.className = `ctrl-sel ${v==='Sim'?'fin-sim':'fin-nao'}`;
  const row = sel.closest('tr');
  row.classList.toggle('row-done', v==='Sim');
  row.querySelectorAll('.col-act').forEach(td=>{
    td.style.background = v==='Sim'?'#f0fff4':'';
  });
  dbPersist(cardId, 'finalizado', v);
  setTimeout(()=>renderAnalitico(), 100);
}

function toggleSort(s, field) {
  const cur = S.sort[s];
  if (!cur||cur.field!==field) S.sort[s]={field,dir:'asc'};
  else if (cur.dir==='asc')    S.sort[s]={field,dir:'desc'};
  else                          S.sort[s]=null;

}

async function abrirComentario(cardId, tipo) {
  const card = S.cards.find(c=>c.id===cardId&&c.tipo===tipo);
  if (!card) return;
  S.commentCtx = {card, tipo};

  document.getElementById('mc-title').textContent = `Comentar: ${card.titulo?.substring(0,48)||'Card'}`;
  const body = document.getElementById('mc-body');
  const ft   = document.getElementById('mc-ft');

  let html = '';
  const neBtn = ['atrasos','negacoes','marketplace'].includes(tipo)
    ? `<button class="btn btn-ne" onclick="sugerirNE('${cardId}','${tipo}')">🤖 Sugerir NE</button>` : '';
  let btns = `<button class="btn" onclick="fecharMdl('mdl-comment')">Cancelar</button>` + neBtn;

  if (tipo==='atrasos') {
    html = buildModalAtraso(card);
    btns += `<button class="btn btn-brand" onclick="enviarComentario()">Publicar nos dois pipes</button>`;
  } else if (tipo==='negacoes') {
    html = buildModalLivre(card, false);
    btns += `<button class="btn btn-brand" onclick="enviarComentario()">Publicar comentário</button>`;
  } else if (tipo==='marketplace') {
    html = buildModalLivre(card, false);
    btns += `<button class="btn btn-brand" onclick="enviarComentario()">Publicar nos dois pipes</button>`;
  } else if (tipo==='vencidos') {
    html = buildModalVencido(card);
    btns += `<button class="btn btn-brand" onclick="enviarComentario()">Concluir atualização</button>`;
  } else if (tipo==='desatualizados') {
    html = buildModalDesatualizado(card);
    btns += `<button class="btn btn-brand" onclick="enviarComentario()">Publicar comentário</button>`;
  }

  // GChat
  html += `<div class="form-grp" style="border-top:1px solid var(--border);padding-top:12px;margin-top:2px">
    <div class="form-lbl">Abrir Tarefa no GChat (opcional)</div>
    <div class="gchat-chips">
      ${GCHAT_GRUPOS.map(g=>`<div class="gchat-chip" data-gid="${g.id}" onclick="this.classList.toggle('active')">${g.nome}</div>`).join('')}
    </div>
  </div>`;

  body.innerHTML = html;
  ft.innerHTML = btns;
  abrirMdl('mdl-comment');

  // Auto-resize textareas no modal
  body.querySelectorAll('.form-ta').forEach(autoExpand);

  // Carregar fases se necessário
  if (tipo==='vencidos'||tipo==='atrasos') carregarFasesSelect(card);

  // Buscar data onboarding para vencidos
  if (tipo==='vencidos' && !card.data_onboarding) {
    try {
      const det = await fetchCardDetalhe(card.id);
      const ob  = det?.fields?.find(f=>f.field?.label?.toLowerCase().includes('onboarding'))?.value;
      if (ob) {
        const el = document.getElementById('mc-onboarding');
        if (el) el.textContent = fmtData(ob);
      }
    } catch(e) {}
  }
}

  if (!sel) return;

async function enviarComentario() {
  const {card, tipo} = S.commentCtx||{};
  if (!card) return;

  const texto   = document.getElementById('mc-text')?.value?.trim()||'';
  const novaData= document.getElementById('mc-due')?.value||'';
  const faseId  = document.getElementById('mc-phase')?.value||'';

  if (tipo==='vencidos') {
    if (!novaData) { toast('Novo vencimento é obrigatório','err'); return; }
    if (!faseId)   { toast('Selecione a fase de destino','err'); return; }
  }

  const gchatAtivos = [...document.querySelectorAll('.gchat-chip.active')].map(el=>el.dataset.gid);

  fecharMdl('mdl-comment');
  banner('Publicando comentário…');

  try {
    if (texto) await postarComentario(card.id, texto);

    if (novaData) await atualizarVencimento(card.id, novaData+'T00:00:00-03:00');

    if (faseId) await moverFase(card.id, faseId);

    // Segundo pipe (Atrasos→OPEC / Marketplace→Cadastros MARKETPLACES).
    // Comenta no card VINCULADO pelo campo "Link do card no Pipefy", nunca no próprio card.
    if ((tipo==='atrasos' || tipo==='marketplace') && texto) {
      const id2 = extrairIdDaURL(card.link_externo);
      if (id2 && id2 !== card.id) {
        try { await postarComentario(id2, texto); }
        catch(e) { console.warn('2º pipe ('+tipo+'):', e); }
      }
    }

    if (gchatAtivos.length) await enviarGChat(card, gchatAtivos);

    toast('Comentário publicado!','success');
    await syncPipefy();
  } catch(e) {
    console.error('enviarComentario:', e);
    toast('Erro: '+e.message,'err',6000);
  } finally {
    hideBanner();
  }
}

async function enviarGChat(card, grupos) {
  const wh = S.cfg.gchatWebhook;
  if (!wh) return;
  const payload = {
    cardsV2: [{
      cardId: card.id,
      card: {
        header: { title: card.titulo, subtitle: `${card.tipo} · ${card.carteira}` },
        sections: [{
          widgets: [
            { textParagraph: { text: `<b>Fase:</b> ${card.fase}` } },
            { textParagraph: { text: `<b>Vencimento:</b> ${fmtData(card.data_vencimento)}` } },
            ...(card.link_pipefy ? [{
              buttonList: { buttons: [{ text: 'Abrir no Pipefy', onClick: { openLink: { url: card.link_pipefy } } }] }
            }] : []),
          ].filter(Boolean)
        }]
      }
    }]
  };
  for (const gid of grupos) {
    try {
      await fetch(wh, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    } catch(e) { console.warn('GChat envio:', e); }
  }
}

  if (!silent && !confirm('Enviar resumo diário ao Google Chat?')) return;
  const wh = S.cfg.gchatWebhook;
  if (!wh) { if (!silent) toast('Configure o webhook do GChat','err'); return; }

  const hoje = hojeBrasilia();
  const cc   = S.ctrl;
  const cs   = S.cards;

  const totalAt  = cs.filter(c=>c.tipo==='atrasos').length;
  const fimHoje  = cs.filter(c=>c.tipo==='atrasos'&&isFinalizadoHoje(cc[c.id])).length;
  const pend     = cs.filter(c=>c.tipo==='atrasos'&&cc[c.id]?.finalizado!=='Sim').length;
  const venc     = cs.filter(c=>c.tipo==='vencidos').length;
  const desat    = cs.filter(c=>c.tipo==='desatualizados').length;

    `⏳ Pendentes: ${pend}`,
    ``,
    `*Vencidos na Fase:* ${venc}`,
    `*Desatualizados:* ${desat}`,

  ].join('\n');

  try {
    banner('Enviando resumo…');

    toast('Resumo enviado!','success');

    toast('Erro: '+e.message,'err');

function renderAnalitico() {
  const cs = S.cards, cc = S.ctrl;

  const at   = cs.filter(c=>c.tipo==='atrasos');
  const neg  = cs.filter(c=>c.tipo==='negacoes');
  const venc = cs.filter(c=>c.tipo==='vencidos');
  const des  = cs.filter(c=>c.tipo==='desatualizados');
  const mkt  = cs.filter(c=>c.tipo==='marketplace');

  const fimHoje = c => isFinalizadoHoje(cc[c.id]);
  const fim     = c => cc[c.id]?.finalizado==='Sim';

  // KPIs
  document.getElementById('kpi-grid').innerHTML = [
    kpi(at.length,          'Atrasos Total',      'c-brand'),
    kpi(at.filter(c=>!fim(c)).length, 'Pendentes','c-red'),
    kpi(at.filter(fimHoje).length,'Concluídos Hoje','c-green'),
    kpi(venc.length,        'Vencidos na Fase',   'c-amber'),
    kpi(des.length,         'Desatualizados',     ''),
    kpi(mkt.length,         'Marketplace',        ''),
  ].join('');

  // Atrasos por carteira
  const carteiraRows = ['Black 1','Black 2','Black 3','Platinum 1','Platinum 2','Titanium 1','Titanium 2','Sem Carteira'].map(cart=>{
    const sub = at.filter(c=>c.carteira===cart);
    return {label:cart, total:sub.length, done:sub.filter(fimHoje).length};
  });
  carteiraRows.push({label:'CS - Negativações', total:neg.length, done:neg.filter(fimHoje).length});

  document.getElementById('ch-carteiras').innerHTML = carteiraRows.map(r=>{
    const pct = r.total ? Math.round(r.done/r.total*100) : 0;
    return `<div class="prog-row">
      <div class="prog-lbl" title="${r.label}">${r.label}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-count">${r.done}/${r.total}</div>
    </div>`;
  }).join('');

  // Conclusões por analista
  const todos = [...at,...neg];
  const rankData = ANALISTAS.map(a=>({
    a,
    n: todos.filter(c=>fimHoje(c)&&cc[c.id]?.analista===a).length
  })).filter(r=>r.n>0).sort((a,b)=>b.n-a.n);

  const maxN = Math.max(1,...rankData.map(r=>r.n));
  const rankHtml = rankData.length
    ? rankData.map(r=>`
      <div class="rank-row">
        <div class="rank-name">${esc(r.a)}</div>
        <div class="rank-n">${r.n}</div>
        <div class="rank-bar"><div class="rank-fill" style="width:${Math.round(r.n/maxN*100)}%"></div></div>
      </div>`).join('')
    : `<div class="empty" style="padding:14px">Nenhuma conclusão registrada hoje</div>`;

  // Metas por responsável: progresso de hoje nas carteiras designadas
  const metaHtml = Object.entries(METAS).map(([analista, alvos])=>{
    const cards = todos.filter(c =>
      alvos.some(alvo => alvo==='negacoes' ? c.tipo==='negacoes' : c.carteira===alvo)
    );
    const total = cards.length;
    const done  = cards.filter(fimHoje).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const alvosLbl = alvos.map(a=>a==='negacoes'?'CS-Negativações':a).join(', ');
    return `<div class="meta-row">
      <div class="meta-row-top">
        <span class="mr-name" title="${esc(analista)} — ${esc(alvosLbl)}"><strong>${esc(analista)}</strong> <span style="color:var(--text3)">${esc(alvosLbl)}</span></span>
        <span class="mr-num">${done}/${total} · ${pct}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('ch-analistas').innerHTML =
    `<div class="a-sub">Metas por responsável — hoje</div>${metaHtml}` +
    `<div class="a-sub" style="margin-top:14px">Ranking de conclusões — hoje</div>${rankHtml}`;
}

const NE_SYSTEM_PROMPT = `Você é um agente especializado em Proteção de Marca e Auditoria Jurídica de Brand Bidding da Branddi. Sua função é analisar o conteúdo completo de um card de atendimento, identificar em qual fase o caso se encontra, calcular o Score de Agressividade e determinar autonomamente o próximo passo — desde a sugestão de NE digital até a recomendação de litígio ou whitelist. Você age como um analista sênior: criterioso, objetivo e capaz de redigir comunicações prontas para envio ao cliente.

ETAPA 0 — IDENTIFICAÇÃO DA FASE
Varra o histórico de comentários, e-mails e logs do card e identifique a fase:
- Fase 1 (Triagem Inicial): nenhuma notificação enviada ainda.
- Fase 2 (NE Digital Enviada): termos como "notificação extrajudicial por e-mail", "minuta enviada", "via escritório parceiro".
- Fase 3 (NE Física Enviada): termos como "carta com AR", "reenvio por carta" ou código de rastreamento dos Correios.

ETAPA 1 — FILTRO ELIMINATÓRIO (antes de qualquer pontuação)
Verifique o status do registro da marca no INPI:
- Ativa (Nominativo ou Misto): prossiga para a pontuação.
- Sem registro ou Arquivada: REPROVADO AUTOMATICAMENTE. Zere o score (todos os critérios = 0). Informe que o caso não deve seguir para NE, salvo orientação expressa do CS Front, do cliente ou do Jurídico. bloqueado = true.

ETAPA 2 — COLETA DE DADOS
Mapeie: Marca monitorada / Concorrente (domínio) / Status INPI / Característica do termo [Puro|Composto|Genérico] / Segmento [Mesmo segmento|Correlato|Distinto] / Posição no ranking BMS / Ocorrências 14 dias / Ocorrências 7 dias / Ciência da negativação [Sim|Não] / Tag "Top Leilão Ativo" / Posicionamento do concorrente [Recusou|Sem posicionamento] / Fase atual / Cliente autorizou envio [Sim|Não|Pendente]. Se algum campo estiver ausente, registre em dados_ausentes e NÃO invente o valor.

ETAPA 3 — SCORE DE AGRESSIVIDADE (máx 90)
A. Característica do Termo (máx 25): Puro=25, Composto=15, Genérico=5. (Composto/Genérico => incluir o aviso do Apêndice A em pontos_atencao.)
B. Relação com Segmento (máx 20): Direto=20, Correlato=10, Distinto=0.
C1. Posição Ranking (máx 5): Top1-5=5, Top6-10=3, Fora=0.
D. Frequência/Recorrência (máx 15): Alta (frequente em 14d + ativo em 7d)=15, Baixa/inativo=0. (Se 0 => incluir nota de reavaliação em pontos_atencao.)
E. Posicionamento Concorrente (máx 15): Recusa expressa / tag de recusa=15, Sem resposta=5.
F. Ciência Negativação (máx 5): Comprovada=5, Sem=0.
G. Tag Top Leilão Ativo (máx 5): Presente=5, Ausente=0.
total = A+B+C1+D+E+F+G.

ETAPA 4 — ÁRVORE DE DECISÃO
FASE 1: avaliar a viabilidade pelo score. total < 11 => caso pouco agressivo, NÃO é viável seguir para NE => sugerir whitelist ao cliente (Apêndice F). total >= 11 => caso viável => sugerir ao cliente o envio de Notificação Extrajudicial e ativar a contraprova dos termos do concorrente (Apêndice B). NÃO sinalizar GreenSign.
FASE 2: houve sucesso? SIM => Encerrar. NÃO => total>=13? NÃO => whitelist se a agressividade baixou. SIM => cliente autorizou física? NÃO => whitelist. SIM => via PFFA ou interno => NE por carta com AR (Apêndice C).
FASE 3: houve sucesso? SIM => Encerrar. NÃO => total>=15? NÃO => whitelist se baixou. SIM => Litígio => via PFFA ou interno (Apêndice D ou E).
Whitelist: Apêndice F.

ETAPA 5 — SAÍDA OBRIGATÓRIA
Sempre entregue: fase identificada, score com justificativa, pontos de atenção, decisão fundamentada e template de comunicação pronto (assunto + corpo), com os dados reais do card preenchidos onde possível.

APÊNDICE A — AVISO TERMOS COMPOSTOS/GENÉRICOS
"Reforçamos o ponto de atenção: notificações baseadas em termos compostos ou genéricos, sem o uso do termo institucional da marca, podem ter menor força e abrir margem para questionamentos. Por isso, caso optem por seguir, é importante alinharmos que se trata de uma decisão com risco envolvido."

APÊNDICE E — PRÓXIMOS PASSOS APÓS NE FÍSICA (INTERNAMENTE)

APÊNDICE F — ENCERRAMENTO E WHITELIST
Assunto: "Encerramento de tratativas com [Nome do Agressor] – [Cliente] | Branddi". Corpo: saudação; atualizar sobre o fim das comunicações com o agressor [NOME DO AGRESSOR]; informar que após [X] notificações por [e-mail/telefone/carta com AR] as tentativas foram finalizadas por [ausência de resposta/recusa formal/solicitação de não contato]; observar que a agressividade do domínio permanece muito baixa, com poucos anúncios ativos, [sem uso de termo puro] e posicionamentos menos relevantes; recomendar a inclusão em whitelist; informar que o monitoramento seguirá e que sinalizarão se o padrão de agressividade voltar a subir. Assinar "Abraços,".

REGRAS GERAIS
Nunca omita pontos de atenção. Nunca invente dados — baseie-se apenas no card e em buscas no INPI quando houver link. Se faltam dados, sinalize em dados_ausentes. Score 0 em D sempre gera nota de reavaliação. O bloqueio por ausência de INPI é inegociável. Adapte todos os templates com os dados reais. A recusa expressa do concorrente é argumento central.

BUSCA NO INPI
Quando houver um link do INPI no card ou nos comentários, use a ferramenta de web search para acessá-lo e verificar: nome da empresa/marca, se há registro ativo, e o tipo (Nominativo / Misto / Sem registro / Arquivada). Se não houver link, registre a limitação em dados_ausentes e use inpi_status "Não localizado".

async function callAnthropicNE(userText, onStatus) {
  // Caminho seguro: proxy via Edge Function (a chave da Anthropic fica no servidor)
  const proxy = (S.cfg.neProxyUrl||'').trim();
  if (proxy) {
    if (onStatus) onStatus('Consultando o agente (servidor seguro)…');
    const anon = (S.cfg.supabaseKey||'').trim();
    const headers = { 'content-type':'application/json' };
    if (anon && !/SUA_/i.test(anon)) { headers['Authorization'] = 'Bearer ' + anon; headers['apikey'] = anon; }
    const resp = await fetch(proxy, {
      method:'POST', headers,
      body: JSON.stringify({ userText, model: (S.cfg.neModel||'').trim() || undefined })
    });
    let data = null;
    try { data = await resp.json(); } catch(e) {}
    if (!resp.ok || data?.error) throw new Error(data?.error || `HTTP ${resp.status}`);
    return (data?.text || '').trim();
  }
  // Fallback: chamada direta ao Anthropic (chave no cliente)
  const key = (S.cfg.anthropicKey||'').trim();
  if (!key || /SUA_|COLOQUE/i.test(key)) throw new Error('Configure o Proxy do Agente de NE (ou a Anthropic API Key) em ⚙ Config.');
  const model = (S.cfg.neModel||'').trim() || 'claude-opus-4-8';
  const messages = [{ role:'user', content: userText }];
  let cont = 0;
  while (true) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: 16000,
        thinking: { type: 'adaptive' },
        system: NE_SYSTEM_PROMPT,
        tools: [{ type: 'web_search_20260209', name: 'web_search', max_uses: 6 }],
        messages,
      }),
    });
    if (!resp.ok) {
      let msg = `HTTP ${resp.status}`;
      try { const e = await resp.json(); msg = e.error?.message || msg; } catch(e) {}
      throw new Error(msg);
    }
    const data = await resp.json();
    // Loop de tool use server-side: continuar quando pausar
    if (data.stop_reason === 'pause_turn' && cont < 4) {
      cont++;
      if (onStatus) onStatus('Consultando o INPI…');
      messages.push({ role:'assistant', content: data.content });
      continue;
    }
    return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
  }
}

function parseJsonLoose(text) {
  if (!text) return null;
  let t = String(text).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  try { return JSON.parse(t); } catch(e) {}
  const i = t.indexOf('{'), j = t.lastIndexOf('}');
  if (i>=0 && j>i) { try { return JSON.parse(t.slice(i,j+1)); } catch(e) {} }
  return null;
}

function detectarFaseNE(texto) {
  const t = (texto||'').toLowerCase();
  // Fase 3: NE física (carta com AR) já enviada
  if (/carta com ar|aviso de recebimento|reenvio por carta|\brastreamento\b|correios/.test(t)) return 'Fase 3';
  // Fase 2: a NE DIGITAL já foi ENVIADA — NÃO confundir com a negativação amigável nem com "sugestão de NE"
  if (/minuta enviad|notifica[çc][ãa]o extrajudicial.*(enviad|protocol)|enviad[ao].*(notifica[çc][ãa]o extrajudicial|minuta)|ne digital enviad|via escrit[óo]rio (de )?advocacia|escrit[óo]rio parceiro/.test(t)) return 'Fase 2';
  // Padrão: triagem (inclui pedido/sugestão de NE e negativação amigável)
  return 'Fase 1';
}

// ── Chamada às Edge Functions (BMS + Pipefy) ──
function neFnUrl(name) { return (S.cfg.supabaseUrl||'').replace(/\/+$/,'') + '/functions/v1/' + name; }
async function neCallFn(name, payload) {
  const anon = (S.cfg.supabaseKey||'').trim();
  const r = await fetch(neFnUrl(name), {
    method:'POST',
    headers:{ 'content-type':'application/json', 'Authorization':'Bearer '+anon, 'apikey':anon },
    body: JSON.stringify(payload||{})
  });
  let j = null; try { j = await r.json(); } catch(e) {}
  if (!r.ok || j?.error) throw new Error(j?.error || ('HTTP '+r.status));
  return j;
}
function getFieldVal(fields, keys) {
  for (const f of (fields||[])) { const lbl=(f.field?.label||'').toLowerCase(); for (const k of keys) { if (lbl.includes(k) && f.value) return f.value; } }
  return '';
}
function normKey(s) { return (s||'').toString().toLowerCase().replace(/[^a-z0-9]/g,''); }

async function sugerirNE(cardId, tipo) {
  const card = S.cards.find(c=>c.id===cardId && c.tipo===tipo) || S.cards.find(c=>c.id===cardId);
  if (!card) { toast('Card não encontrado','err'); return; }
  S.neCtx = { card, tipo, faseDetectada:'Fase 1', result:null, auto:null, concorrente: card.concorrente||'' };
  document.getElementById('ne-ft').innerHTML = `<button class="btn" onclick="fecharMdl('mdl-ne')">Fechar</button>`;
  document.getElementById('ne-body').innerHTML = `<div class="ne-loading"><div class="spinner"></div><div>Puxando BMS + Pipefy automaticamente…</div></div>`;
  abrirMdl('mdl-ne');
  const setStatus = m => { const el=document.querySelector('#ne-body .ne-loading div:last-child'); if (el) el.textContent=m; };
  try {
    const token = (S.cfg.pipefyToken||'').trim();
    const podePipe = token && !/SEU_/i.test(token) && card.id && card.id!=='exemplo';
    const pPipe = podePipe ? neCallFn('pipefy-card',{cardId:card.id, pipefyToken:token}).catch(()=>null) : Promise.resolve(null);
    const pBms  = card.titulo ? neCallFn('bms-lookup',{brand:card.titulo}).catch(e=>({__err:String((e&&e.message)||e)})) : Promise.resolve(null);
    const [pf, bms] = await Promise.all([pPipe, pBms]);

    // ── Pipefy: comentários + labels + concorrente + card OPEC vinculado ──
    let comments=[], labels=[], phase='', concorrente=card.concorrente||'';
    if (pf?.card) {
      const c = pf.card;
      phase = c.current_phase?.name || '';
      (c.comments||[]).forEach(x=>comments.push(x.text||''));
      (c.labels||[]).forEach(l=>labels.push(l.name||''));
      if (!concorrente) concorrente = getFieldVal(c.fields,['concorrente','competitor','agressor']);
      const linkExt = getFieldVal(c.fields,['link do card no pipefy','link do card','opec','link opec']) || card.link_pipefy;
      const opecId = (String(linkExt).match(/cards\/(\d+)/)||[])[1];
      if (opecId && opecId !== String(card.id)) {
        setStatus('Lendo o card OPEC vinculado…');
        const pf2 = await neCallFn('pipefy-card',{cardId:opecId, pipefyToken:token}).catch(()=>null);
        if (pf2?.card) {
          (pf2.card.comments||[]).forEach(x=>comments.push(x.text||''));
          (pf2.card.labels||[]).forEach(l=>labels.push(l.name||''));
          if (pf2.card.current_phase?.name) phase += ' ' + pf2.card.current_phase.name;
        }
      }
    }
    const blob = comments.join('  \n  ') + ' ' + phase;
    const fase = detectarFaseNE(blob);
    const abertura = /aberto/i.test(blob);
    const recusa = /(neg(ou|aram|ou-se|a-se)[^.]{0,40}(negativ|contat))|n[ãa]o (deseja|quer)( mais)? (ser )?contat|recus(ou|a-se|aram)|n[ãa]o deseja contato/i.test(blob);
    const labLow = labels.map(s=>(s||'').toLowerCase());
    let topLeilao = null;
    if (labLow.some(l=>l.includes('top leilão ativo')||l.includes('top leilao ativo'))) topLeilao='ativo';
    else if (labLow.some(l=>l.includes('top leilão inativo')||l.includes('top leilao inativo'))) topLeilao='inativo';

    // ── BMS: casa o agressor pelo concorrente do card ──
    let termo=null, ranking=null, freq=null, aggr=null;
    if (bms?.found && Array.isArray(bms.aggressors)) {
      const cn = normKey(concorrente);
      let chosen = cn ? bms.aggressors.find(a=>normKey(a.domain).includes(cn) || cn.includes(normKey(a.domain).replace(/(com|br|www)/g,''))) : null;
      if (!chosen) chosen = bms.aggressors[0] || null; // sem match: usa o mais agressivo/melhor posição
      if (chosen) {
        termo = chosen.termo;
        ranking = chosen.bestPosition==null ? null : (chosen.bestPosition<=5?'top5':(chosen.bestPosition<=10?'top10':'fora'));
        freq = (chosen.occ14d>0 && chosen.occ7d>0) ? 'alta' : 'baixa';
        aggr = chosen;
      }
    }

    S.neCtx.faseDetectada = fase;
    S.neCtx.concorrente = concorrente;
    S.neCtx.auto = { termo, ranking, freq, posicionamento: recusa?'recusa':'sem', ciencia: abertura?'sim':'nao', topLeilao, aggressor:aggr, bmsFound:!!bms?.found, bmsErro:(bms&&bms.__err)||null, pipeOk:!!pf?.card };
    renderNEForm();
    aplicarAutoNE();
  } catch(e) {
    console.error('sugerirNE:', e);
    S.neCtx.auto = null;
    renderNEForm();
    toast('Não consegui puxar tudo automático ('+(e.message||e)+'). Confira/preencha manualmente.','err',6000);
  }
}

// Aplica no formulário os valores puxados automaticamente (deixa Segmento + INPI pro analista)
function aplicarAutoNE() {
  const a = S.neCtx.auto;
  const set = (id,v) => { const el=document.getElementById(id); if (el && v!=null && v!=='') el.value=String(v); };
  if (a) {
    set('ne-termo', a.termo==='Puro'?25:a.termo==='Composto'?15:a.termo==='Genérico'?5:'');
    set('ne-rank',  a.ranking==='top5'?5:a.ranking==='top10'?3:a.ranking==='fora'?0:'');
    if (a.freq) set('ne-freq', a.freq==='alta'?15:0);
    set('ne-pos',  a.posicionamento==='recusa'?15:5);
    set('ne-cien', a.ciencia==='sim'?5:0);
    set('ne-tag',  a.topLeilao==='ativo'?5:a.topLeilao==='inativo'?0:'');
    set('ne-abertura', a.ciencia==='sim'?'sim':'nao');
    const agg = a.aggressor;
    const resumo = [
      a.pipeOk ? 'Pipefy lido ✓' : 'Pipefy não lido (confira o token)',
      a.bmsErro ? ('BMS: falha ao consultar — '+a.bmsErro+' (provável CORS na função bms-lookup)') : (a.bmsFound ? ('BMS: '+(agg?('agressor '+agg.domain+(agg.bestPosition!=null?' · pos '+agg.bestPosition:'')+(agg.termo?' · termo '+agg.termo:'')):'campanha encontrada')) : 'BMS: marca não encontrada'),
      '➡ confirme só Segmento e INPI.'
    ].join(' · ');
    const body = document.getElementById('ne-body');
    if (body) { const d=document.createElement('div'); d.className='info-box'; d.style.marginBottom='12px'; d.textContent='🤖 '+resumo; body.insertBefore(d, body.firstChild); }
  }
}

function calcularNE() {
  const card = S.neCtx.card;
  const val = id => document.getElementById(id)?.value;
  const num = id => parseInt(document.getElementById(id)?.value||'0',10)||0;
  const fase = val('ne-fase') || 'Fase 1';
  const inpi = val('ne-inpi') || 'Não localizado';
  const bloqueado = inpi==='Sem registro' || inpi==='Arquivada';

  const A=num('ne-termo'),B=num('ne-seg'),C1=num('ne-rank'),
        D=num('ne-freq'),E=num('ne-pos'),F=num('ne-cien'),G=num('ne-tag');
  const score = bloqueado
    ? {A_termo:0,B_segmento:0,C1_ranking:0,D_frequencia:0,E_posicionamento:0,F_ciencia:0,G_topleilao:0,total:0}
    : {A_termo:A,B_segmento:B,C1_ranking:C1,D_frequencia:D,E_posicionamento:E,F_ciencia:F,G_topleilao:G,total:A+B+C1+D+E+F+G};

  const camposScore = [['ne-termo','Característica do termo'],['ne-seg','Relação com o segmento'],['ne-rank','Posição no ranking'],['ne-freq','Frequência/recorrência'],['ne-pos','Posicionamento do concorrente'],['ne-cien','Abertura do e-mail (ciência)'],['ne-tag','Tag Top Leilão']];
  const pontos=[], ausentes=[];
  if (!bloqueado) {
    if (val('ne-termo')==='15' || val('ne-termo')==='5') pontos.push('Termo composto/genérico: notificações sem o termo institucional têm menor força e abrem margem a questionamentos — seguir é uma decisão com risco envolvido (Apêndice A).');
    if (val('ne-freq')==='0') pontos.push('Frequência baixa/inativo (D=0): reavaliar a agressividade antes de notificar.');
    if (val('ne-pos')==='15') pontos.push('A recusa expressa do concorrente fortalece a justificativa para evolução do caso para Notificação Extrajudicial.');
    camposScore.forEach(([id,lbl]) => { if ((val(id)||'')==='') ausentes.push(lbl + ' (não preenchido)'); });
  }
  if (inpi==='Não localizado') ausentes.push('Status do INPI não confirmado — verificar o registro antes de notificar.');

  const total = score.total;
  const topLabel = C1===5?'Top 1–5':(C1===3?'Top 6–10':'fora do Top 10');
  let decisao='', apendice=null;

  if (bloqueado) {
    decisao = `Reprovado no filtro INPI (marca ${inpi}). Não seguir para NE, salvo orientação expressa do Jurídico, do CS Front ou do cliente.`;
  } else if (fase==='Fase 1') {
    if (total < 11) {
      decisao = `Pouca agressividade (score ${total}/90). Não é viável seguir para NE agora — decisão: sugerir whitelist ao cliente (e-mail abaixo) e seguir monitorando.`;
      apendice = 'F';
    } else {
      decisao = `Caso viável para NE (score ${total}/90, ${topLabel}). Decisão: sugerir ao cliente o envio de Notificação Extrajudicial — usar o e-mail abaixo. Em paralelo, ativar a contraprova dos termos do concorrente.`;
      apendice = 'B';
    }
  } else if (fase==='Fase 2') {
    if (val('ne-sucesso')==='sim') decisao = 'Encerrar — o concorrente cessou a prática após a NE digital.';
    else if (total<13) { decisao = `Agressividade baixa (score ${total} < 13). Recomendar inclusão em whitelist.`; apendice='F'; }
    else {
      const aut = val('ne-autoriz');
      if (aut!=='sim') { decisao = `Score ${total} ≥ 13, mas o cliente ${aut==='nao'?'não autorizou':'ainda não autorizou (pendente)'} a NE física. Avaliar whitelist ou aguardar a autorização.`; apendice='F'; }
      else { decisao = `Escalar para NE física (carta com AR) — score ${total} ≥ 13 e cliente autorizou.`; apendice='C'; }
    }
  } else {
    if (val('ne-sucesso')==='sim') decisao = 'Encerrar — o concorrente cessou a prática após a NE física.';
    else if (total<15) { decisao = `Agressividade baixa (score ${total} < 15). Recomendar inclusão em whitelist.`; apendice='F'; }
    else {
      const via = val('ne-via');
      decisao = `Score ${total} ≥ 15 e sem resolução após a NE física. Próximo passo: litígio / aconselhamento jurídico (${via==='interno'?'reforço interno + escritório parceiro':'via escritório parceiro / PFFA'}).`;
      apendice = via==='interno' ? 'E' : 'D';
    }
  }

  const aggrNE = (S.neCtx && S.neCtx.auto) ? S.neCtx.auto.aggressor : null;
  const email = apendice ? neEmail(apendice, card, {
    topLabel, termoPuro: A===25,
    posicao: (aggrNE && aggrNE.bestPosition != null) ? aggrNE.bestPosition : null,
    recusa: val('ne-pos')==='15',
    ciencia: (val('ne-cien')==='5' || val('ne-abertura')==='sim')
  }) : null;
  const obj = { fase, inpi_status:inpi, bloqueado,
    motivo_bloqueio: bloqueado?`Marca ${inpi} no INPI`:null,
    score, pontos_atencao:pontos, dados_ausentes:ausentes, decisao, email };
  S.neCtx.result = obj;
  renderNEResult(obj);
}

  const email = o.email || {};
  const emailHtml = email.corpo ? `
    <div class="ne-sec">
      <div class="ne-sec-title">Comunicação sugerida (pronta para envio)</div>
      <div class="ne-email">
        <div class="ne-email-subj">${esc(email.assunto||'(sem assunto)')}</div>
        <div class="ne-email-body">${esc(email.corpo)}</div>
        ${email.apendice_usado?`<div class="ne-apx">Modelo: Apêndice ${esc(email.apendice_usado)}</div>`:''}
      </div>
    </div>` : '';

  document.getElementById('ne-body').innerHTML = `
    ${bloqueio}
    <div class="ne-sec"><div class="ne-row">
      <span class="ne-fase-badge">📌 ${esc(o.fase||'Fase não identificada')}</span>
      <span class="ne-inpi-badge">INPI: ${esc(o.inpi_status||'—')}</span>
    </div></div>
    <div class="ne-sec">
      <div class="ne-sec-title">Score de agressividade</div>
      <table class="ne-score"><tbody>${scoreRows}${totalRow}</tbody></table>
    </div>
    <div class="ne-sec"><div class="ne-sec-title">Pontos de atenção</div>${atencao}</div>
    <div class="ne-sec"><div class="ne-sec-title">Dados ausentes</div>${ausentes}</div>
    <div class="ne-sec">
      <div class="ne-sec-title">Decisão</div>
      <div class="ne-decisao">${esc(o.decisao||'—')}</div>
    </div>
    ${emailHtml}`;

  document.getElementById('ne-ft').innerHTML =
    `<button class="btn" onclick="fecharMdl('mdl-ne')">Fechar</button>` +
    (email.corpo
      ? `<button class="btn" onclick="copiarEmailNE()">📋 Copiar e-mail</button><button class="btn btn-brand" onclick="usarEmailNoComentario()">Usar no comentário</button>`
      : '');
}

function copiarEmailNE() {
  const e = S.neCtx?.result?.email; if (!e) return;
  const txt = (e.assunto?`${e.assunto}\n\n`:'') + (e.corpo||'');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(txt).then(()=>toast('E-mail copiado','success'), ()=>toast('Não foi possível copiar','err'));
  } else { toast('Cópia não suportada neste navegador','err'); }
}

function usarEmailNoComentario() {
  const e = S.neCtx?.result?.email; if (!e?.corpo) return;
  const ta = document.getElementById('mc-text');
  if (ta) { ta.value = e.corpo; autoExpand(ta); }
  fecharMdl('mdl-ne');
  toast('Texto inserido no comentário','success');
}

// ─────────────────────────────────────────────
// AGENDAMENTO (backup no browser — só funciona com o dashboard aberto)
// ─────────────────────────────────────────────
function startScheduler() {
  setInterval(() => {
    // Sync horário: dispara 1h após o último sync, se não houver outro em curso
    if (!S.syncRunning && S.lastSync && (Date.now() - S.lastSync.getTime()) >= 3600000) {
      syncPipefy();
    }
    // Resumo às 8h (Brasília), seg–sex, no máximo 1x por dia
    const agora = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
    const dow = agora.getDay(); // 0=dom … 6=sáb
    const hojeStr = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(agora.getDate()).padStart(2,'0')}`;
    if (dow>=1 && dow<=5 && agora.getHours()===8 && agora.getMinutes()<5
        && S.cfg.gchatWebhook && localStorage.getItem('brd_lastResumo')!==hojeStr) {
      localStorage.setItem('brd_lastResumo', hojeStr);
      enviarResumo(true);
    }
  }, 60000);
}

// ─────────────────────────────────────────────
// INICIALIZAÇÃO
// ─────────────────────────────────────────────
async function init() {
  S.cfg = getCfg();
  initSupabase();
  populaMassAnal();

  // Renderiza tabs imediatamente
  ['atrasos','negacoes','outros'].forEach(s=>{
    renderCarteiraTabs(s);
  });

  // Carrega controles do Supabase
  await carregarControles();

  // Sempre faz sync do Pipefy ao abrir
  await syncPipefy();

  // Backup no browser: sync horário + resumo às 8h (só com o dashboard aberto)
  startScheduler();
}

init();
</script>
